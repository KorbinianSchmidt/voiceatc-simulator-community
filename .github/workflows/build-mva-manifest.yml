name: Build MVA Manifest

on:
  push:
    branches:
      - main
    paths:
      - "**/mva.json"
      - "tools/import_legacy_mva.py"
      - "tools/mva_manifest.py"
      - "tests/test_mva_manifest.py"
      - ".github/workflows/build-mva-manifest.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run tests
        run: python -m unittest discover -s tests -p "test_*.py"
      - name: Generate manifest
        run: python tools/mva_manifest.py --write
      - name: Commit manifest
        run: |
          if git diff --quiet -- .voiceatc/mva_manifest.json; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .voiceatc/mva_manifest.json
          git commit -m "chore: refresh mva manifest"
          git push
