name: Validate MVA

on:
  pull_request:
    branches:
      - main
    paths:
      - "**/mva.json"
      - "tools/import_legacy_mva.py"
      - "tools/mva_manifest.py"
      - "tests/test_mva_manifest.py"
      - ".github/workflows/validate-mva.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run tests
        run: python -m unittest discover -s tests -p "test_*.py"
      - name: Validate MVA files
        run: python tools/mva_manifest.py --validate-only
