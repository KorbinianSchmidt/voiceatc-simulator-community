name: Build Runway Configs Manifest

on:
  push:
    branches:
      - main
    paths:
      - "**/runway_config.json"
      - "tools/runway_configs_manifest.py"
      - ".github/workflows/build-runway-configs-manifest.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Generate manifest
        run: python tools/runway_configs_manifest.py --write
      - name: Commit manifest
        run: |
          if git diff --quiet -- .voiceatc/runway_configs_manifest.json; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .voiceatc/runway_configs_manifest.json
          git commit -m "chore: refresh runway configs manifest"
          git push
