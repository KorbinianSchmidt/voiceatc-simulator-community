name: Validate Runway Configs

on:
  pull_request:
    branches:
      - main
    paths:
      - "**/runway_configs.json"
      - "**/runway_config.json"
      - "tools/runway_configs_manifest.py"
      - "tests/test_runway_configs_manifest.py"
      - ".github/workflows/validate-runway-configs.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run tests
        run: python -m unittest discover -s tests -p "test_*.py"
      - name: Validate runway configs
        run: python tools/runway_configs_manifest.py --validate-only
